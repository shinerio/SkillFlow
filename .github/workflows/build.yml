name: Build

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: amd64
            name: macos-intel
          - os: macos-latest
            arch: arm64
            name: macos-apple-silicon
          - os: windows-latest
            arch: amd64
            name: windows

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build
        run: wails build -platform ${{ matrix.arch == 'arm64' && 'darwin/arm64' || matrix.os == 'windows-latest' && 'windows/amd64' || 'darwin/amd64' }} -ldflags "-X main.Version=${{ github.ref_name }}"

      # macOS: package .app bundle into a DMG for distribution
      - name: Package macOS DMG
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname "SkillFlow" \
            -srcfolder build/bin/SkillFlow.app \
            -ov -format UDZO \
            build/bin/SkillFlow-${{ matrix.name }}.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skillflow-${{ matrix.name }}
          path: ${{ runner.os == 'Windows' && 'build/bin/SkillFlow.exe' || format('build/bin/SkillFlow-{0}.dmg', matrix.name) }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Rename Windows executable
        run: mv dist/skillflow-windows/SkillFlow.exe dist/SkillFlow-windows.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/skillflow-macos-intel/SkillFlow-macos-intel.dmg
            dist/skillflow-macos-apple-silicon/SkillFlow-macos-apple-silicon.dmg
            dist/SkillFlow-windows.exe
          generate_release_notes: true
