name: Build

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: amd64
            name: macos-intel
          - os: macos-latest
            arch: arm64
            name: macos-apple-silicon
          - os: windows-latest
            arch: amd64
            name: windows

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build
        run: wails build -platform ${{ matrix.arch == 'arm64' && 'darwin/arm64' || matrix.os == 'windows-latest' && 'windows/amd64' || 'darwin/amd64' }} -ldflags "-X main.Version=${{ github.ref_name }}"

      # macOS: package .app bundle into a drag-to-install DMG
      - name: Package macOS DMG
        if: runner.os == 'macOS'
        run: |
          # Copy our multi-resolution icns into the built app bundle
          cp build/darwin/iconfile.icns build/bin/SkillFlow.app/Contents/Resources/iconfile.icns

          TMPDIR_DMG="$(mktemp -d)"
          TMP_DMG="/tmp/SkillFlow-rw.dmg"
          FINAL_DMG="build/bin/SkillFlow-${{ matrix.name }}.dmg"

          # Create a staging folder: app + Applications symlink
          cp -R build/bin/SkillFlow.app "$TMPDIR_DMG/SkillFlow.app"
          ln -s /Applications "$TMPDIR_DMG/Applications"

          # Create a writable DMG from the staging folder
          hdiutil create -srcfolder "$TMPDIR_DMG" \
            -volname "SkillFlow" -fs HFS+ \
            -fsargs "-c c=64,a=16,b=16" \
            -format UDRW -size 300m "$TMP_DMG"

          # Mount the writable DMG
          MOUNT_POINT="$(hdiutil attach -readwrite -noverify -noautoopen "$TMP_DMG" | grep '/Volumes/' | awk '{print $NF}')"
          sleep 2
          sync

          # Detach with retry and force fallback
          for i in 1 2 3; do
            hdiutil detach "$MOUNT_POINT" && break
            echo "Detach attempt $i failed, retrying in 5s..."
            sleep 5
          done || hdiutil detach -force "$MOUNT_POINT"

          # Convert to compressed read-only DMG
          hdiutil convert "$TMP_DMG" -format UDZO -imagekey zlib-level=9 -o "$FINAL_DMG"
          rm -f "$TMP_DMG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skillflow-${{ matrix.name }}
          path: ${{ runner.os == 'Windows' && 'build/bin/SkillFlow.exe' || format('build/bin/SkillFlow-{0}.dmg', matrix.name) }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Rename Windows executable
        run: mv dist/skillflow-windows/SkillFlow.exe dist/SkillFlow-windows.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/skillflow-macos-intel/SkillFlow-macos-intel.dmg
            dist/skillflow-macos-apple-silicon/SkillFlow-macos-apple-silicon.dmg
            dist/SkillFlow-windows.exe
          generate_release_notes: true
